@if (isNew()) {
    <h1 translate>TEMPLATE_EDITOR.TITLE</h1>
} @else {
    <h1>{{data().name}}</h1>
    <div class="row">
        <div class="chip" [ngClass]="statusSeverity()">{{'TEMPLATE_EDITOR.STATUS.' + status().toUpperCase() | translate}}</div>
        <div class="chip" [ngClass]="qualitySeverity()">{{'TEMPLATE_EDITOR.QUALITY.' + quality().toUpperCase() | translate}}</div>
    </div>
}
<div class="row flex-1">
    @if (isNew()) {
        <div class="input">
            <label for="category_select" translate>TEMPLATE_EDITOR.HEADER.CATEGORY</label>
            <select id="category_select" [(ngModel)]="data().category" required>
                @if (!data().category) {
                <option value="" disabled [selected]="!data().category.length" translate>TEMPLATE_EDITOR.SELECT_CATEGORY</option>
                }
                @for (cat of categories; track cat) {
                    <option [value]="cat">{{'TEMPLATE_EDITOR.CATEGORY.' + cat.toUpperCase() | translate}}</option>
                }
            </select>
        </div>
        <div class="input">
            <label for="language_select" translate>TEMPLATE_EDITOR.HEADER.LANGUAGE</label>
            <select id="language_select" [(ngModel)]="data().language" required>
                @if (!data().language) {
                <option value="" disabled [selected]="!data().language.length" translate>TEMPLATE_EDITOR.SELECT_LANGUAGE</option>
                }
                @for (lang of languages; track lang) {
                <option [value]="lang">{{'TEMPLATE_EDITOR.LANGUAGE.' + lang.toUpperCase() | translate}}</option>
                }
            </select>
        </div>
    } @else {
        {{category() | translate}}
        {{language()}}
        <button (click)="delete($event)" class="button-delete button-cancel">
            <delete-icon></delete-icon>
            <span translate>
                TEMPLATE_EDITOR.BUTTONS.DELETE
            </span>
        </button>
    }
</div>

@if (isNew()) {
    <div class="input" >
        <label for="template_name" translate>TEMPLATE_EDITOR.HEADER.TITLE</label>
        <div [tabIndex]="-1" [tooltip]="'TEMPLATE_EDITOR.HEADER.TITLE_VALIDATION_HINT' | translate">
            <input type="text" name="template_name" id="template_name" [ngModel]="data().name | lowercase" (ngModelChange)="data().name = $event?.toLowerCase()" [maxlength]="512" required/>
        </div>
    </div>
}
