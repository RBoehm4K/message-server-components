<div class="confirmation-dialog">
    <div class="confirmation-content">
        <span translate>{{ message() }}</span>
        <div class="confirmation-buttons">
            <button (click)="cancel()" class="button-cancel" translate>{{ cancelText() }}</button>
            <button (click)="confirm()" class="button-confirm" translate>{{ confirmText() }}</button>
        </div>
    </div>
</div>
