<div class="row">
    <div class="form">
        <template-header [data]="data()" (delete)="delete($event)"></template-header>
        <template-body [data]="data()" [options]="options()"></template-body>
        <template-footer [data]="data()" (cancel)="reset($event)" (save)="save($event)" (delete)="delete($event)"></template-footer>
    </div>
    <template-preview [data]="data()" [options]="options()"></template-preview>
    @if(loading()) {
    <div class="loading-overlay">
        <spinner-icon></spinner-icon>
    </div>
    }
</div>
