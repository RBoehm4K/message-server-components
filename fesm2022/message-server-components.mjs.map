<div class="input">
    <label for="api-key" translate>INTEGRATION.API_KEY</label>
    <input type="password" id="api-key" name="api-key" [(ngModel)]="API_KEY" />
</div>
@let isLoading = facebookState() === 'loading';
<button class="button facebook" [ngClass]="{'loading': isLoading}" type="button" [disabled]="isLoading || facebookButtonDisabled()" translate (click)="launchSignUp()">
    @if(isLoading) {
        <spinner-icon></spinner-icon>
    } @else {
        INTEGRATION.FACEBOOK.LOGIN
    }
</button>
<!-- <button id="reloadButton" type="button"  translate>INTEGRATION.RELOAD</button> -->
