<div class="column">
    @if (error?.length) {
    <div class="notification error">
        @for (err of error; track err) {
        <div translate>{{ err }}</div>
        }
    </div>
    }
    
    <div class="row">
        <button type="button" (click)="cancel($event)" class="button-cancel" translate>TEMPLATE_EDITOR.BUTTONS.CANCEL</button>
        <button type="submit" (click)="save($event)" class="button-confirm" [disabled]="isInvalid" translate>TEMPLATE_EDITOR.BUTTONS.SAVE</button>
    </div>
</div>
